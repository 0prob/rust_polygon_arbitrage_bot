        sTimer = setTimeout(function() {
            var term = searchEl.value.toLowerCase();
            var updates = [];
            nodes.forEach(function(n) {
                var h = term && !n.label.toLowerCase().includes(term);
                if (n.hidden !== h) { updates.push({ id: n.id, hidden: h }); }
            });
